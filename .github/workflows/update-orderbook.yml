name: Update Orderbook

on:
  workflow_dispatch:        # Triggered externally (cron-job.org) or manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch orderbook from Particl network
        run: python scraper.py --auto --duration 15 -o orderbook.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add orderbook.json
          git diff --cached --quiet || git commit -m "Update orderbook $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
