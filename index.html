<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasicSwapDEX Orderbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            coolGray: { 100: '#f3f4f6', 200: '#e5e7eb' },
            gray: {
              400: '#4a5568', 500: '#2d3748', 600: '#1a202c', 700: '#171923', 800: '#111827'
            }
          },
          fontFamily: {
            mono: ['"SF Mono"', '"Fira Code"', '"Cascadia Code"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .monospace { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 0.85em; }
    .coin-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .filter-btn { transition: all 0.15s ease; cursor: pointer; }
    .filter-btn:hover { border-color: #6b7280; }
    .filter-btn.active { background: #2d3748; border-color: #4d84f0; color: #fff !important; }
    .dark .filter-btn.active { background: rgba(77,132,240,0.15); border-color: #4d84f0; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .live-dot { animation: pulse-dot 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-700 min-h-screen">

<!-- Header -->
<header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-600">
  <div class="container mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="text-2xl font-bold text-gray-800 dark:text-white tracking-tight">
        <span class="text-blue-500">BasicSwapDEX</span> Orderbook
      </div>
      <span class="live-dot inline-block w-2 h-2 rounded-full bg-green-400 mt-1"></span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span id="status" class="text-xs text-gray-400 dark:text-gray-300"></span>
      <button onclick="toggleTheme()" class="p-2 rounded-lg bg-coolGray-200 dark:bg-gray-600 text-gray-500 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-500 transition">
        <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
        <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- Filters + Stats -->
<section class="container mx-auto px-4 py-5">
  <div class="flex flex-wrap items-center gap-3 mb-3">
    <span class="text-sm font-semibold text-gray-500 dark:text-gray-400">Filter:</span>
    <button class="filter-btn active px-3 py-1.5 text-xs font-semibold rounded-lg border border-gray-300 dark:border-gray-500 text-gray-600 dark:text-gray-300" data-coin="ALL" onclick="setFilter('ALL', this)">All Coins</button>
    <div id="coin-filters" class="flex flex-wrap gap-2"></div>
  </div>
  <div class="flex flex-wrap gap-6 text-xs text-gray-400 dark:text-gray-300">
    <span>Offers: <strong id="stat-offers" class="text-gray-700 dark:text-gray-100">—</strong></span>
    <span>Pairs: <strong id="stat-pairs" class="text-gray-700 dark:text-gray-100">—</strong></span>
    <span>Updated: <strong id="stat-updated" class="text-gray-700 dark:text-gray-100">—</strong></span>
  </div>
</section>

<!-- Table -->
<section class="container mx-auto px-4 pb-8">
  <div class="bg-coolGray-100 dark:bg-gray-500 rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-600 border-b border-gray-200 dark:border-gray-500">
            <th class="py-3 pl-4 pr-2 text-left text-xs font-bold uppercase text-gray-500 dark:text-gray-300 cursor-pointer select-none" onclick="sortBy('timestamp')">Time <span id="sort-timestamp" class="sort-icon">↓</span></th>
            <th class="py-3 px-2 text-center text-xs font-bold uppercase text-gray-500 dark:text-gray-300">Swap</th>
            <th class="py-3 px-2 text-right text-xs font-bold uppercase text-gray-500 dark:text-gray-300 cursor-pointer select-none" onclick="sortBy('amount_from')">You Send <span id="sort-amount_from" class="sort-icon"></span></th>
            <th class="py-3 px-2 text-right text-xs font-bold uppercase text-gray-500 dark:text-gray-300 cursor-pointer select-none" onclick="sortBy('amount_to')">You Get <span id="sort-amount_to" class="sort-icon"></span></th>
            <th class="py-3 px-2 text-right text-xs font-bold uppercase text-gray-500 dark:text-gray-300 cursor-pointer select-none" onclick="sortBy('rate')">Rate <span id="sort-rate" class="sort-icon"></span></th>
            <th class="py-3 pl-2 pr-4 text-right text-xs font-bold uppercase text-gray-500 dark:text-gray-300">Swap Type</th>
          </tr>
        </thead>
        <tbody id="offers-body">
          <tr><td colspan="6" class="py-16 text-center text-gray-400 dark:text-gray-300">
            <div class="flex flex-col items-center gap-3">
              <div class="w-16 h-1 bg-blue-500 rounded-full animate-pulse"></div>
              <span class="text-sm">Loading orderbook...</span>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="container mx-auto px-4 pb-8 text-center">
  <p class="text-xs text-gray-400 dark:text-gray-300">
    Powered by <a href="https://basicswapdex.com" class="text-blue-400 hover:underline">BasicSwapDEX</a>
  </p>
</footer>

<script>
const COIN_COLORS = {
  BTC:'#f7931a', XMR:'#ff6600', LTC:'#bfbbbb', PART:'#02e8b0', BCH:'#8dc351',
  FIRO:'#9b1c2e', DASH:'#008ce7', PIVX:'#5e4778', WOW:'#ff69b4', DOGE:'#c3a634',
  DCR:'#2ed6a1', NAV:'#7d59b5', NMC:'#186c9d',
};
const COIN_NAMES = {
  BTC:'Bitcoin', XMR:'Monero', LTC:'Litecoin', PART:'Particl', BCH:'Bitcoin Cash',
  FIRO:'Firo', DASH:'Dash', PIVX:'PIVX', WOW:'Wownero', DOGE:'Dogecoin',
  DCR:'Decred', NAV:'Navcoin', NMC:'Namecoin',
};
const SWAP_TYPES = {
  1:'Secret Hash', 2:'Seller First', 3:'Seller First 2msg',
  4:'Buyer First 2msg', 5:'Adaptor Sig', 6:'Adaptor Sig'
};

let allOffers = [];
let currentFilter = 'ALL';
let currentSort = 'timestamp';
let sortAsc = false;

function coinIcon(ticker) {
  const c = COIN_COLORS[ticker] || '#6b7280';
  return `<span class="coin-icon" style="background:${c}">${ticker.slice(0,1)}</span>`;
}

function timeAgo(ts) {
  const s = Math.floor(Date.now()/1000) - ts;
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function formatPostedTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderOffers() {
  let offers = [...allOffers];
  if (currentFilter !== 'ALL') {
    offers = offers.filter(o => o.coin_from === currentFilter || o.coin_to === currentFilter);
  }
  offers.sort((a, b) => sortAsc ? a[currentSort] - b[currentSort] : b[currentSort] - a[currentSort]);

  const tbody = document.getElementById('offers-body');
  if (!offers.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-gray-400 dark:text-gray-300 text-sm">No offers match this filter</td></tr>`;
    return;
  }
  tbody.innerHTML = offers.map(o => {
    const rate = o.rate;
    const inverseRate = rate ? (1 / rate) : 0;
    const fromSym = o.coin_from;
    const toSym = o.coin_to;
    const swapLabel = SWAP_TYPES[o.swap_type] || 'Unknown';
    return `
    <tr class="opacity-100 text-gray-500 dark:text-gray-100 hover:bg-coolGray-200 dark:hover:bg-gray-600 border-b border-gray-200 dark:border-gray-600">
      <td class="py-3 pl-4 pr-2 text-xs whitespace-nowrap">
        <div class="flex items-center">
          <svg class="w-5 h-5 rounded-full mr-3 text-green-500 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linecap="round" stroke-width="2" fill="none" stroke="#10B981" stroke-linejoin="round">
              <circle cx="12" cy="12" r="11"></circle>
              <polyline points="12,6 12,12 18,12" stroke="#10B981"></polyline>
            </g>
          </svg>
          <div class="flex flex-col">
            <span class="font-bold">${formatPostedTime(o.timestamp)}</span>
            <span class="text-gray-400 dark:text-gray-300">${timeAgo(o.timestamp)}</span>
          </div>
        </div>
      </td>
      <td class="py-0 px-2 text-center">
        <div class="flex items-center justify-center gap-1">
          <span class="inline-flex items-center justify-center w-10 h-10 rounded">
            ${coinIcon(toSym)}
          </span>
          <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          <span class="inline-flex items-center justify-center w-10 h-10 rounded">
            ${coinIcon(fromSym)}
          </span>
        </div>
      </td>
      <td class="py-3 px-2 text-right">
        <div class="pr-2">
          <div class="text-sm font-semibold monospace">${o.amount_from_str}</div>
          <div class="text-xs text-gray-500 dark:text-gray-400">${COIN_NAMES[fromSym] || fromSym}</div>
        </div>
      </td>
      <td class="py-3 px-2 text-right">
        <div class="pr-2">
          <div class="text-sm font-semibold monospace">${o.amount_to_str}</div>
          <div class="text-xs text-gray-500 dark:text-gray-400">${COIN_NAMES[toSym] || toSym}</div>
        </div>
      </td>
      <td class="py-3 px-2 text-right monospace">
        <div class="flex flex-col items-end pr-2">
          <span class="text-sm font-bold text-gray-700 dark:text-white">${rate.toFixed(8)} ${toSym}/${fromSym}</span>
          <span class="text-xs text-gray-400 dark:text-gray-300">${inverseRate.toFixed(8)} ${fromSym}/${toSym}</span>
        </div>
      </td>
      <td class="py-3 pl-2 pr-4 text-right text-xs">
        <span class="whitespace-nowrap font-semibold text-gray-500 dark:text-gray-300">${swapLabel}</span>
      </td>
    </tr>`;
  }).join('');
}

function buildFilters() {
  const coins = [...new Set(allOffers.flatMap(o => [o.coin_from, o.coin_to]))].sort();
  const container = document.getElementById('coin-filters');
  container.innerHTML = coins.map(c =>
    `<button class="filter-btn px-3 py-1.5 text-xs font-semibold rounded-lg border border-gray-300 dark:border-gray-500 text-gray-600 dark:text-gray-300 flex items-center gap-1.5" data-coin="${c}" onclick="setFilter('${c}', this)">
      ${coinIcon(c)} ${c}
    </button>`
  ).join('');
}

function setFilter(coin, btn) {
  currentFilter = coin;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOffers();
}

function sortBy(field) {
  if (currentSort === field) { sortAsc = !sortAsc; } else { currentSort = field; sortAsc = false; }
  document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '');
  const icon = document.getElementById('sort-' + field);
  if (icon) icon.textContent = sortAsc ? '↑' : '↓';
  renderOffers();
}

function updateStats() {
  document.getElementById('stat-offers').textContent = allOffers.length;
  const pairs = new Set(allOffers.map(o => `${o.coin_from}/${o.coin_to}`));
  document.getElementById('stat-pairs').textContent = pairs.size;
  document.getElementById('stat-updated').textContent = new Date().toLocaleTimeString();
}

async function fetchOrderbook() {
  try {
    const r = await fetch('orderbook.json?' + Date.now());
    const data = await r.json();
    allOffers = data.offers || [];
    buildFilters();
    renderOffers();
    updateStats();
    document.getElementById('status').textContent = `${allOffers.length} offers`;
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading data';
    console.error(e);
  }
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('bsx-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}

if (localStorage.getItem('bsx-theme') === 'light') document.documentElement.classList.remove('dark');
fetchOrderbook();
setInterval(fetchOrderbook, 60000);
</script>
</body>
</html>
